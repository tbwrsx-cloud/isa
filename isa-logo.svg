<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <!-- Indian flag gradient background -->
    <linearGradient id="flagGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FF9933" stop-opacity="0.18"/>
      <stop offset="50%" stop-color="#FFFFFF" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#138808" stop-opacity="0.18"/>
    </linearGradient>
    <!-- Glow effects -->
    <radialGradient id="centerGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00d4aa" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#00d4aa" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="strongGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.5"/>
    </filter>
    <clipPath id="roundedClip">
      <rect x="20" y="20" width="360" height="360" rx="48" ry="48"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect x="20" y="20" width="360" height="360" rx="48" fill="#0a0e1a"/>

  <!-- Indian flag stripe backgrounds (subtle) -->
  <rect x="20" y="20" width="360" height="120" rx="0" fill="#FF9933" fill-opacity="0.12" clip-path="url(#roundedClip)"/>
  <rect x="20" y="140" width="360" height="120" fill="#FFFFFF" fill-opacity="0.03" clip-path="url(#roundedClip)"/>
  <rect x="20" y="260" width="360" height="120" rx="0" fill="#138808" fill-opacity="0.12" clip-path="url(#roundedClip)"/>

  <!-- Center radial glow -->
  <circle cx="200" cy="195" r="140" fill="url(#centerGlow)"/>

  <!-- Ashoka Chakra (simplified) - faint in background -->
  <g transform="translate(200,195)" opacity="0.08">
    <circle r="72" fill="none" stroke="#1a6bb5" stroke-width="2.5"/>
    <circle r="60" fill="none" stroke="#1a6bb5" stroke-width="1"/>
    <!-- 24 spokes -->
    <g stroke="#1a6bb5" stroke-width="1.2">
      <line x1="0" y1="-60" x2="0" y2="-72"/>
      <line x1="0" y1="60" x2="0" y2="72"/>
      <line x1="-60" y1="0" x2="-72" y2="0"/>
      <line x1="60" y1="0" x2="72" y2="0"/>
      <line x1="-42.4" y1="-42.4" x2="-50.9" y2="-50.9"/>
      <line x1="42.4" y1="-42.4" x2="50.9" y2="-50.9"/>
      <line x1="-42.4" y1="42.4" x2="-50.9" y2="50.9"/>
      <line x1="42.4" y1="42.4" x2="50.9" y2="50.9"/>
      <line x1="-15.6" y1="-58.0" x2="-18.8" y2="-69.7"/>
      <line x1="15.6" y1="-58.0" x2="18.8" y2="-69.7"/>
      <line x1="-15.6" y1="58.0" x2="-18.8" y2="69.7"/>
      <line x1="15.6" y1="58.0" x2="18.8" y2="69.7"/>
      <line x1="-58.0" y1="-15.6" x2="-69.7" y2="-18.8"/>
      <line x1="58.0" y1="-15.6" x2="69.7" y2="-18.8"/>
      <line x1="-58.0" y1="15.6" x2="-69.7" y2="18.8"/>
      <line x1="58.0" y1="15.6" x2="69.7" y2="18.8"/>
      <line x1="-54.4" y1="-27.3" x2="-65.3" y2="-32.7"/>
      <line x1="54.4" y1="-27.3" x2="65.3" y2="-32.7"/>
      <line x1="-54.4" y1="27.3" x2="-65.3" y2="32.7"/>
      <line x1="54.4" y1="27.3" x2="65.3" y2="32.7"/>
      <line x1="-27.3" y1="-54.4" x2="-32.7" y2="-65.3"/>
      <line x1="27.3" y1="-54.4" x2="32.7" y2="-65.3"/>
      <line x1="-27.3" y1="54.4" x2="-32.7" y2="65.3"/>
      <line x1="27.3" y1="54.4" x2="32.7" y2="65.3"/>
    </g>
    <circle r="8" fill="#1a6bb5" opacity="0.6"/>
  </g>

  <!-- Stock trend chart — main visual element -->
  <!-- Grid lines (subtle) -->
  <g stroke="#1e2d45" stroke-width="0.5" opacity="0.6">
    <line x1="55" y1="240" x2="345" y2="240"/>
    <line x1="55" y1="210" x2="345" y2="210"/>
    <line x1="55" y1="180" x2="345" y2="180"/>
    <line x1="55" y1="150" x2="345" y2="150"/>
  </g>

  <!-- Candlesticks -->
  <!-- Bear candle 1 -->
  <g filter="url(#glow)">
    <line x1="90" y1="218" x2="90" y2="248" stroke="#ef4444" stroke-width="1.5"/>
    <rect x="82" y="222" width="16" height="18" fill="#ef4444" rx="2" opacity="0.9"/>
  </g>
  <!-- Bull candle 2 -->
  <g filter="url(#glow)">
    <line x1="125" y1="200" x2="125" y2="245" stroke="#22c55e" stroke-width="1.5"/>
    <rect x="117" y="208" width="16" height="24" fill="#22c55e" rx="2" opacity="0.9"/>
  </g>
  <!-- Bull candle 3 -->
  <g filter="url(#glow)">
    <line x1="160" y1="190" x2="160" y2="230" stroke="#22c55e" stroke-width="1.5"/>
    <rect x="152" y="194" width="16" height="22" fill="#22c55e" rx="2" opacity="0.9"/>
  </g>
  <!-- Bear candle 4 -->
  <g filter="url(#glow)">
    <line x1="195" y1="185" x2="195" y2="222" stroke="#ef4444" stroke-width="1.5"/>
    <rect x="187" y="190" width="16" height="18" fill="#ef4444" rx="2" opacity="0.9"/>
  </g>
  <!-- Bull candle 5 -->
  <g filter="url(#glow)">
    <line x1="230" y1="158" x2="230" y2="210" stroke="#22c55e" stroke-width="1.5"/>
    <rect x="222" y="162" width="16" height="30" fill="#22c55e" rx="2" opacity="0.9"/>
  </g>
  <!-- Bull candle 6 -->
  <g filter="url(#glow)">
    <line x1="265" y1="138" x2="265" y2="190" stroke="#22c55e" stroke-width="1.5"/>
    <rect x="257" y="142" width="16" height="28" fill="#22c55e" rx="2" opacity="0.9"/>
  </g>
  <!-- Bull candle 7 -->
  <g filter="url(#glow)">
    <line x1="300" y1="118" x2="300" y2="168" stroke="#22c55e" stroke-width="1.5"/>
    <rect x="292" y="122" width="16" height="26" fill="#22c55e" rx="2" opacity="0.9"/>
  </g>

  <!-- Trend line (glowing teal) -->
  <polyline
    points="82,235 117,220 152,204 187,198 222,175 257,152 292,130"
    fill="none"
    stroke="#00d4aa"
    stroke-width="2.5"
    stroke-linecap="round"
    stroke-linejoin="round"
    filter="url(#strongGlow)"
    opacity="0.9"/>

  <!-- Trend line glow layer -->
  <polyline
    points="82,235 117,220 152,204 187,198 222,175 257,152 292,130"
    fill="none"
    stroke="#00d4aa"
    stroke-width="5"
    stroke-linecap="round"
    stroke-linejoin="round"
    opacity="0.15"/>

  <!-- Up arrow at end of trend -->
  <g filter="url(#strongGlow)">
    <polygon points="308,115 300,130 316,130" fill="#00d4aa" opacity="0.95"/>
  </g>

  <!-- ₹ Rupee symbol (large, faint background) -->
  <text x="200" y="215" font-family="Georgia, serif" font-size="160" font-weight="700"
    fill="#00d4aa" fill-opacity="0.04" text-anchor="middle" dominant-baseline="middle">₹</text>

  <!-- App name text -->
  <text x="200" y="308" font-family="Georgia, 'Times New Roman', serif"
    font-size="22" font-weight="700" fill="#e2e8f0"
    text-anchor="middle" letter-spacing="1" filter="url(#shadow)">IndiaStock</text>
  <text x="200" y="332" font-family="'Courier New', Courier, monospace"
    font-size="11" font-weight="400" fill="#00d4aa"
    text-anchor="middle" letter-spacing="4">ANALYSER</text>

  <!-- Indian flag stripe accents (top and bottom border) -->
  <rect x="20" y="20" width="360" height="12" rx="0" fill="#FF9933" fill-opacity="0.95" clip-path="url(#roundedClip)"/>
  <rect x="20" y="32" width="360" height="10" fill="#FFFFFF" fill-opacity="1" clip-path="url(#roundedClip)"/>
  <rect x="20" y="42" width="360" height="12" fill="#138808" fill-opacity="0.95" clip-path="url(#roundedClip)"/>

  <rect x="20" y="368" width="360" height="12" rx="0" fill="#FF9933" fill-opacity="0.95" clip-path="url(#roundedClip)"/>
  <rect x="20" y="358" width="360" height="10" fill="#FFFFFF" fill-opacity="1" clip-path="url(#roundedClip)"/>
  <rect x="20" y="346" width="360" height="12" fill="#138808" fill-opacity="0.95" clip-path="url(#roundedClip)"/>

  <!-- Outer rounded border -->
  <rect x="20" y="20" width="360" height="360" rx="48" fill="none" stroke="#1e2d45" stroke-width="1.5"/>

  <!-- Corner accent dots -->
  <circle cx="60" cy="60" r="3" fill="#FF9933" opacity="0.5"/>
  <circle cx="340" cy="60" r="3" fill="#138808" opacity="0.5"/>
  <circle cx="60" cy="340" r="3" fill="#138808" opacity="0.5"/>
  <circle cx="340" cy="340" r="3" fill="#FF9933" opacity="0.5"/>
</svg>
